services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: momo-store-backend:latest
    container_name: momo-backend
    restart: unless-stopped
    networks:
      - backend-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VUE_APP_API_URL: ${VUE_APP_API_URL:-http://localhost:8080/api}
    image: momo-store-frontend:latest
    container_name: momo-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    networks:
      - frontend-network
      - backend-network
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /var/cache/nginx:mode=1775,size=32m
      - /var/run:mode=1775,size=8m
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:8080/momo-store/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true
